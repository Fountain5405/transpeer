general:
  stop_time: 300s
  model_unblocked_syscall_latency: true
  parallelism: 4

network:
  graph:
    type: gml
    inline: |
      graph [
        node [
          id 0
          label "net0"
          bandwidth_down "100 Mbit"
          bandwidth_up "100 Mbit"
        ]
        edge [
          source 0
          target 0
          latency "50 ms"
          packet_loss 0.0
        ]
      ]

hosts:
  transpeer1:
    network_node_id: 0
    bandwidth_down: "100 Mbit"
    bandwidth_up: "100 Mbit"
    ip_addr: 11.0.0.1
    processes:
    - path: python3
      args: -m transpeer --bind 0.0.0.0 --port 7337 --scan-range 11.0.0.0/28 --difficulty 1 --networks none --in-memory
      environment:
        PYTHONPATH: /home/lever65/transpeer
        PYTHONUNBUFFERED: "1"
      start_time: 1s
      expected_final_state: running

