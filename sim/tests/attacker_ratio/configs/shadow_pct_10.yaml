    - path: python3
      args: -m transpeer --bind 0.0.0.0 --port 7337 --scan-range 11.0.0.0/20 --difficulty
        100 --networks p2pb:10100:10101 p2pa:10000:10001 --in-memory --sim-pow --no-verify
        --static-peers 'p2pb:11.0.0.28:10100,11.0.0.71:10100,11.0.2.15:10100,11.0.1.29:10100;p2pa:11.0.1.228:10000,11.0.0.106:10000,11.0.0.64:10000,11.0.1.169:10000'
