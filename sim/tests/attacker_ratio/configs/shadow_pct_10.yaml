    inline: "graph [\n  node [\n    id 0\n    label \"net0\"\n    bandwidth_down \"\
      1 Gbit\"\n    bandwidth_up \"1 Gbit\"\n  ]\n  edge [\n    source 0\n    target\
      \ 0\n    latency \"50 ms\"\n    packet_loss 0.0\n  ]\n]"
